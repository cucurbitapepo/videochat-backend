version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: videochat-db
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - videochat-net
    restart: unless-stopped

  livekit:
    image: livekit/livekit-server:latest
    container_name: livekit-server
    ports:
      - "7881:7881/tcp"  # WebRTC tcp backup
      - "3478:3478/udp"  # TURN/STUN for WebRTC
      - "5349:5349/tcp"  # TURN over TLS
      - "50000-50500:50000-50500/udp"  # WebRTC media ports
    volumes:
      - ./livekit/livekit.yaml:/livekit/livekit.yaml
      - ./livekit/certs:/livekit/certs
    command: --config /livekit/livekit.yaml
    environment:
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - videochat-net
    restart: unless-stopped

  api:
    build: .
    container_name: videochat-api
    ports:
      - "8080:8080"
    environment:
      - JAVA_OPTS=-Xms512m -Xmx1536m
      - SERVER_PORT=8080
      - DB_URL=${DB_URL}
      - DB_USERNAME=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - LIVEKIT_INTERNAL_URL=${LIVEKIT_INTERNAL_URL}
      - LIVEKIT_EXTERNAL_URL=${LIVEKIT_EXTERNAL_URL}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGINS=${CORS_ORIGINS}
    deploy:
      resources:
        limits:
          memory: 2G
    depends_on:
      - postgres
      - livekit
    networks:
      - videochat-net
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: videochat-nginx
    ports:
      - "80:80"    # HTTP
      - "443:443"  # HTTPS
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certbot/conf:/etc/letsencrypt:ro
      - ./nginx/certbot/www:/var/www/certbot:rw
    depends_on:
      - api
      - livekit
    networks:
      - videochat-net
    restart: unless-stopped

volumes:
  pgdata:

networks:
  videochat-net:
    driver: bridge