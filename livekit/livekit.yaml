port: 7880

keys:
  ${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}

rtc:
  port_range_start: 50000
  port_range_end: 60000
  tcp_port: 7881
  use_external_ip: false
  node_ip: 10.0.2.2

  stun_servers:
    - stun.l.google.com:19302
    - stun1.l.google.com:19302
    - stun2.l.google.com:19302

turn:
  enabled: true
  udp_port: 3478
  tls_port: 5349
  domain: ${SERVER_API}
  cert_file: "/livekit/certs/cert.pem"
  key_file: "/livekit/certs/key.pem"
  relay_range_start: 1024
  relay_range_end: 30000

room:
  max_participants: 10
  empty_timeout: 300
  departure_timeout: 20

logging:
  level: "debug"
  json: true
  sample: false